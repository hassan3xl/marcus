services:
  db:
    image: postgres:15-alpine
    container_name: mstore-db
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: mstore_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: "no" # Better for dev: won't run when you're not coding
    deploy:
      resources:
        limits:
          memory: 256M # Postgres is efficient for small dev DBs
        reservations:
          memory: 128M

  # redis:
  #   image: redis:7-alpine
  #   container_name: mstore-redis
  #   ports:
  #     - "6379:6379"
  #   restart: "no"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 128M # Redis is extremely light; 128MB is plenty for dev
  #   command: ["redis-server", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]

  backend:
    build: ./backend
    container_name: mstore-backend
    volumes:
      - ./backend:/app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      # - redis # Uncomment if you integrate Redis into your backend
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 512M
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: mstore-frontend
    volumes:
      - ./frontend:/app
      - /app/.next # Crucial for Next.js performance
    env_file: .env
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 1G # Next.js needs the most room to compile your code
    command: npm run dev

volumes:
  postgres_data:
